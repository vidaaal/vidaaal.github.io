<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supremacy</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- HEADER (VOCÊ VAI COLOCAR DEPOIS) -->
    <header class="header">
      <div class="logo">
        <img src="../medias/supsupreme.png" alt="SUPREMACY" />
      </div>

      <div class="header-icons">
        <!-- USER -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.4"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a7.5 7.5 0 1115 0"
          />
        </svg>

        <!-- BAG -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.4"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.5 9V6.75a4.5 4.5 0 10-9 0V9m-2.25 0h13.5l-1.125 9.75A2.25 2.25 0 0115.39 21H8.61a2.25 2.25 0 01-2.235-2.25L5.25 9z"
          />
        </svg>

        <!-- CART -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.4"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 3h2l.4 2m0 0L7 13h10l2-8H5.4m0 0L4 3m3 13a1 1 0 100 2 1 1 0 000-2zm10 0a1 1 0 100 2 1 1 0 000-2z"
          />
        </svg>
      </div>
    </header>

    <main class="container">
      <!-- LOGO + MENU -->
      <section class="topbar">
        <div class="search-icon"></div>

        <div class="menu-area">
          <div class="logo">
            <img src="../medias/suplogo.png" />
          </div>

          <nav>
            <ul>
              <li><a href="#">SHOP</a></li>
              <li><a href="#">NEW SHIT</a></li>
              <li><a href="#">SALE</a></li>
              <li><a href="#">WHO WE ARE</a></li>
            </ul>
          </nav>
        </div>

        <div class="icons"></div>
      </section>

      <!-- GRID SUPERIOR -->
      <section class="grid-top">
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
        <div class="card">
          <div class="image"></div>
          <div class="info"></div>
        </div>
      </section>

      <!-- BANNER CENTRAL -->
      <section class="banner-area">
        <div class="banner">
          <img src="../medias/sup1.png" alt="Banner" class="banner-image" />
          <span class="banner-text">RIVAL - SUPREMACY JACKET - 2026</span>
        </div>
      </section>

      <!-- GRID INFERIOR -->
      <section class="bottom-area">
        <div class="bottom-grid">
          <div class="big-banner">
            <img
              src="../medias/moodelo2.png"
              alt="RIVAL SUPREMACY JACKET 2026"
              class="banner-img"
            />
            <span>RIVAL - SUPREMACY JACKET - 2026</span>
          </div>

          <div class="mini-grid">
            <div class="mini-card">
              <div class="image">
                <img src="look1.jpg" alt="Look 1" />
              </div>
              <div class="info"></div>
            </div>

            <div class="mini-card">
              <div class="image">
                <img src="look2.jpg" alt="Look 2" />
              </div>
              <div class="info"></div>
            </div>

            <div class="mini-card">
              <div class="image">
                <img src="look3.jpg" alt="Look 3" />
              </div>
              <div class="info"></div>
            </div>

            <div class="mini-card">
              <div class="image">
                <img src="look4.jpg" alt="Look 4" />
              </div>
              <div class="info"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER (VOCÊ VAI COLOCAR DEPOIS) -->
    <footer class="footer">
      <div class="footer-left">
        <ul>
          <li><a href="#">SHOP</a></li>
          <li><a href="#">NOVIDADES</a></li>
          <li><a href="#">SALE</a></li>
          <li><a href="#">WHO WE ARE</a></li>
        </ul>
      </div>

      <div class="footer-center">
        <div class="footer-links">
          <p><a href="#">Trocas e Devoluções</a></p>
          <p><a href="#">Política de Privacidade</a></p>
          <p><a href="#">Termos de Serviço</a></p>
          <p><a href="#">Política de Cancelamento</a></p>
        </div>

        <div class="copyright">
          <p>© 2026 - RIVAL. All Rights Reserved.</p>
        </div>

        <div class="footer-logos">
          <img src="../medias/suplogo.png" alt="Logo 1" />
          <img src="../medias/supfriends.png" alt="Logo 2" />
          <img src="../medias/supsupreme.png" alt="Logo 3" />
        </div>
      </div>
    </footer>
  </body>
</html>
